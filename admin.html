<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الأدمين</title>
  <style>
    body{margin:0;font-family:system-ui;background:#0f172a;color:#e5e7eb}
    .wrap{max-width:1100px;margin:0 auto;padding:20px}
    .card{background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:18px;margin-top:16px}
    input,button,textarea,select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:#0b1220;color:#fff;box-sizing:border-box}
    button{cursor:pointer;background:#2563eb;font-weight:700}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.08);text-align:right}
    .row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end}
    .muted{color:#94a3b8}
    @media (max-width:800px){.grid,.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>لوحة الأدمين</h1>
    <p class="muted">هذه صفحة إدارة سريعة لإضافة الأصناف ومراجعة الطلبات.</p>

    <div class="card">
      <h3>إضافة صنف</h3>
      <div class="grid">
        <input id="name" placeholder="اسم الطبق" />
        <input id="category" placeholder="القسم" />
        <input id="price" type="number" placeholder="السعر" />
        <input id="image" placeholder="رابط الصورة" />
      </div>
      <textarea id="desc" placeholder="الوصف" style="margin-top:10px"></textarea>
      <button style="margin-top:10px" onclick="addItem()">حفظ</button>
    </div>

    <div class="card">
      <h3>الأصناف</h3>
      <table>
        <thead><tr><th>الاسم</th><th>القسم</th><th>السعر</th></tr></thead>
        <tbody id="items"></tbody>
      </table>
    </div>

    <div class="card">
      <h3>الطلبات</h3>
      <table>
        <thead><tr><th>الطاولة</th><th>الحالة</th><th>الإجمالي</th></tr></thead>
        <tbody id="orders"></tbody>
      </table>
    </div>
  </div>

  <script>
    const secret = prompt('أدخل السر الإداري:', 'change_this_secret') || 'change_this_secret';
    const api = '/api/admin/summary?secret=' + encodeURIComponent(secret);

    function money(n){ return `${Number(n || 0).toLocaleString('ar-IQ')} د.ع`; }

    async function loadAll(){
      const res = await fetch(api);
      if (!res.ok) {
        document.body.innerHTML = '<div style="padding:20px">غير مصرح.</div>';
        return;
      }
      const data = await res.json();
      const items = data.items || [];
      const orders = data.orders || [];
      document.getElementById('items').innerHTML = items.map(i => `<tr><td>${i.name}</td><td>${i.category}</td><td>${money(i.price)}</td></tr>`).join('') || '<tr><td colspan="3">لا يوجد</td></tr>';
      document.getElementById('orders').innerHTML = orders.map(o => `<tr><td>${o.table}</td><td>${o.status}</td><td>${money(o.total)}</td></tr>`).join('') || '<tr><td colspan="3">لا يوجد</td></tr>';
    }

    async function addItem(){
      const body = {
        name: document.getElementById('name').value,
        category: document.getElementById('category').value,
        price: document.getElementById('price').value,
        image: document.getElementById('image').value,
        desc: document.getElementById('desc').value
      };
      const res = await fetch('/api/items', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      if (!res.ok) return alert('فشل الحفظ');
      await loadAll();
      alert('تم الحفظ');
    }

    loadAll();
    setInterval(loadAll, 4000);
  </script>
</body>
</html>
